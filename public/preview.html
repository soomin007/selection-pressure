<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>적자생존 — 폰·데스크톱 동시 미리보기</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #0b0e14;
        color: #e6e6e6;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 14px;
        padding: 12px 18px;
        background: rgba(12, 16, 24, 0.95);
        border-bottom: 1px solid #2a3346;
      }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
      }
      header .hint {
        font-size: 12px;
        color: #8a93a6;
      }
      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
      }
      .controls label {
        font-size: 13px;
        color: #aeb7c4;
      }
      .controls input {
        width: 130px;
        padding: 6px 8px;
        background: #11151f;
        border: 1px solid #2a3346;
        border-radius: 7px;
        color: #e6e6e6;
        font-size: 13px;
      }
      .controls button {
        padding: 6px 11px;
        background: #1c2536;
        border: 1px solid #36436a;
        border-radius: 7px;
        color: #cfe0ff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .controls button:hover {
        background: #243150;
      }
      main {
        display: flex;
        flex-wrap: wrap;
        gap: 26px;
        align-items: flex-start;
        padding: 22px;
      }
      .device {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .device .cap {
        font-size: 13px;
        font-weight: 600;
        color: #aeb7c4;
      }
      .device .cap span {
        color: #6b7589;
      }
      /* 폰: 베젤 느낌 */
      .phone {
        padding: 12px;
        background: #05070b;
        border: 1px solid #222a3a;
        border-radius: 32px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }
      .phone iframe {
        width: 390px;
        height: 844px;
        border: 0;
        border-radius: 22px;
        background: #0b0e14;
        display: block;
      }
      /* 데스크톱: 창 느낌(타이틀바) */
      .desk {
        border: 1px solid #222a3a;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }
      .desk .bar {
        height: 26px;
        background: #161c28;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
      }
      .desk .bar i {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3a4458;
        display: inline-block;
      }
      .desk iframe {
        width: 960px;
        height: 600px;
        border: 0;
        background: #0b0e14;
        display: block;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>적자생존 — 동시 미리보기</h1>
      <span class="hint">같은 시드로 폰·데스크톱을 나란히. 한 화면에서 둘 다 확인.</span>
      <div class="controls">
        <label for="seed">시드</label>
        <input id="seed" value="preview" />
        <button id="apply">↻ 적용·새로고침</button>
        <button id="rand">🎲 랜덤 시드</button>
      </div>
    </header>
    <main>
      <div class="device">
        <div class="cap">📱 모바일 <span>(390×844, 세로)</span></div>
        <div class="phone"><iframe id="mobile" scrolling="no" title="모바일"></iframe></div>
      </div>
      <div class="device">
        <div class="cap">🖥 데스크톱 <span>(960×600, 가로)</span></div>
        <div class="desk">
          <div class="bar"><i></i><i></i><i></i></div>
          <iframe id="desktop" scrolling="no" title="데스크톱"></iframe>
        </div>
      </div>
    </main>

    <script>
      // 같은 시드(?seed=…)를 두 iframe 에 줘서 동일 런을 폰/데스크톱 두 레이아웃으로 본다.
      // 레이아웃은 각 iframe 의 창 비율로 자동 결정된다(세로=모바일, 가로+넓음=데스크톱).
      // 이 페이지는 dev 도구라 Math.random 써도 무방(시뮬 결정론 규칙은 src/sim 한정).
      const mobile = document.getElementById("mobile");
      const desktop = document.getElementById("desktop");
      const seedInput = document.getElementById("seed");
      let nonce = 0;

      function reload() {
        const seed = encodeURIComponent(seedInput.value.trim() || "preview");
        nonce += 1; // 같은 시드여도 강제 새로고침되게
        const url = `./index.html?seed=${seed}&_=${nonce}`;
        mobile.src = url;
        desktop.src = url;
      }

      document.getElementById("apply").addEventListener("click", reload);
      document.getElementById("rand").addEventListener("click", () => {
        seedInput.value = Math.random().toString(36).slice(2, 8);
        reload();
      });
      reload();
    </script>
  </body>
</html>
