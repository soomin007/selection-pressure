<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- 모바일·세로 우선. 확대/축소 막아서 게임 캔버스가 뷰포트를 그대로 채우게 한다. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#12140f" />
    <title>적자생존</title>
    <!-- 3a "포근한 관찰" 타이포: 디스플레이=Black Han Sans, 제목·큰 숫자=Jua, 본문=IBM Plex Sans KR,
         계측(수치)=JetBrains Mono. 핸드오프 §3·§10. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #12140f;
        /* 폰 주소창/노치 영역 대응 */
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* 캔버스가 창 전체를 실제 픽셀로 채운다. 레터박스는 PixiJS 가 배경색으로 처리. */
      #app,
      #app > canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
